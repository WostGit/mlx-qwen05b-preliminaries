name: mlx-qwen05b-preliminaries

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  preliminaries:
    name: MLX + Qwen 0.5B strict verbose test
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: System info
        run: |
          set -euxo pipefail
          echo "=== SYSTEM ==="
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Actor: $GITHUB_ACTOR"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          sw_vers
          uname -a

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python info
        run: |
          python --version
          python - <<'PY'
          import platform, sys
          print("platform:", platform.platform())
          print("python:", sys.version)
          PY

      - name: Cache HuggingFace
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-${{ runner.arch }}-mlx-qwen05b
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-

      - name: Install deps
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install mlx mlx-lm huggingface_hub

      - name: Package versions
        run: |
          python - <<'PY'
          import importlib.metadata as md
          print("=== PACKAGES ===")
          for p in ["mlx", "mlx-lm", "huggingface_hub"]:
              try:
                  print(p, md.version(p))
              except Exception as e:
                  print(p, "NOT FOUND", e)
          PY

      - name: Run strict prelim test
        run: |
          set -euxo pipefail

          python - <<'PY'
          import time, sys, platform
          import importlib.metadata as md

          print("\n=== PRELIM START ===")

          print("\nENV:")
          print(platform.platform())
          print(sys.version)

          print("\nIMPORT TEST")
          t0 = time.time()
          import mlx
          from mlx_lm import load, generate
          print("import OK in", round(time.time() - t0, 4), "sec")

          try:
              print("mlx:", md.version("mlx"))
              print("mlx-lm:", md.version("mlx-lm"))
          except:
              print("version lookup failed")

          print("\nMODEL LOAD")
          MODEL = "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
          t1 = time.time()
          model, tokenizer = load(MODEL)
          load_time = time.time() - t1
          print("loaded", MODEL)
          print("load_sec:", round(load_time, 4))

          print("\nGENERATION")

          PROMPT = "Return EXACTLY this token with no extra text: PRELIM_OK"
          print("prompt:", PROMPT)

          t2 = time.time()

          output = generate(
              model,
              tokenizer,
              prompt=PROMPT,
              max_tokens=6,
              verbose=True,
          )

          gen_time = time.time() - t2

          print("\nRAW OUTPUT:")
          print(repr(output))

          normalized = " ".join(output.strip().split())
          print("\nNORMALIZED:")
          print(repr(normalized))

          expected = "PRELIM_OK"
          print("\nEXPECTED:", expected)

          if normalized != expected:
              print("\n❌ FAIL")
              print("got:", normalized)
              print("expected:", expected)
              sys.exit(1)

          print("\n✅ PASS")

          print("\nTIMINGS")
          print("load_sec:", round(load_time, 4))
          print("generate_sec:", round(gen_time, 4))
          print("total_sec:", round(time.time() - t0, 4))

          print("\n=== PRELIM COMPLETE ===")
          PY
